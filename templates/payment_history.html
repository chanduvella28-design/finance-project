<!DOCTYPE html>
<html>
<head>
    <title>Payment History</title>
</head>
<body>

<h1>Payment History</h1>

<table border="1">

<tr>
    <th>Payment ID</th>
    <th>Customer ID</th>
    <th>Payment Date</th>
    <th>Interest Amount</th>
</tr>

{% for payment in payments %}

<tr>
    <td>{{ payment[0] }}</td>
    <td>{{ payment[1] }}</td>
    <td>{{ payment[2] }}</td>
    <td>{{ payment[3] }}</td>
</tr>

{% endfor %}

</table>

<br><br>

<a href="/">Back To Home</a>

</body>
</html>
